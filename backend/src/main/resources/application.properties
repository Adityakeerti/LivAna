spring.application.name=backend
spring.profiles.active=${SPRING_PROFILE:dev}
server.port=8080
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
management.endpoints.web.exposure.include=health,info

# ── Rate Limiting Tiers (Bucket4j + Valkey) ────────────────────────────────
# Tier             Limit          Window    Key scope
# GENERAL          200 req        1 min     per authenticated user
# SEARCH           60  req        1 min     per authenticated user  (GET /api/listings/**, /api/businesses/**)
# AUTH_ATTEMPT     10  req        15 min    per IP                  (POST /api/auth/**)
# IMAGE_UPLOAD     20  req        1 hour    per authenticated user  (POST *image*)
# UNAUTH           30  req        1 min     per IP                  (no valid JWT)
# Valkey keys:  rl:user:<userId>:<TIER>  |  rl:ip:<ip>:<TIER>
# Inspect live keys:  redis-cli --scan --pattern 'rl:*'